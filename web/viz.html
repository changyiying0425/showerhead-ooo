<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蓮蓬頭 — 音訊視覺化</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #ccc;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1rem;
    }

    #mode-label {
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      transition: color 0.3s;
    }

    #state-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.8rem;
      color: #666;
      min-height: 1.4rem;
    }

    /* 進度條（環境音收音進度） */
    #progress-wrap {
      width: 200px;
      height: 6px;
      background: #222;
      border-radius: 3px;
      overflow: hidden;
      display: none;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: #42b8ff;
      border-radius: 3px;
      transition: width 0.25s linear, background 0.3s;
    }

    /* 狀態點 */
    #state-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    #canvas-wrap {
      position: relative;
    }

    canvas {
      display: block;
      border-radius: 6px;
    }

    #thresh-label {
      position: absolute;
      right: 8px;
      font-size: 0.6rem;
      color: #555;
      pointer-events: none;
    }

    #rms-value {
      font-size: 0.8rem;
      color: #555;
    }

    #status {
      font-size: 0.7rem;
      color: #333;
    }
  </style>
</head>
<body>
  <div id="mode-label">連線中…</div>

  <div id="state-row">
    <div id="state-dot"></div>
    <span id="state-label">—</span>
    <div id="progress-wrap">
      <div id="progress-bar"></div>
    </div>
    <span id="progress-label"></span>
  </div>

  <div id="canvas-wrap">
    <canvas id="waveform" width="700" height="200"></canvas>
    <div id="thresh-label" style="top:0">rms 0.015</div>
  </div>

  <div id="rms-value">rms —</div>
  <div id="status">等待連線</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const canvas    = document.getElementById('waveform');
    const ctx       = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    const HISTORY   = 140;   // ~14 秒歷史（每 0.3s 一格）
    let   THRESHOLD = 0.030; // 由 server 動態更新，與 VAD_SPEECH_THRESHOLD 同步
    const SCALE     = 5.5;

    let history     = new Array(HISTORY).fill(0);
    let currentMode = 'ambient';
    let currentState= 'waiting';

    const THEME = {
      ambient:  { active: '#42b8ff', dim: '#0a1f3d', label: '環境音模式',       color: '#42b8ff' },
      dialogue: { active: '#ff8c42', dim: '#3d1500', label: '對話模式（握住中）', color: '#ff8c42' },
    };

    const STATE_INFO = {
      accumulating: { dot: '#42b8ff', text: '收音中' },
      processing:   { dot: '#f5d020', text: '處理中' },
      speech:       { dot: '#ff4444', text: '偵測到聲音' },
      waiting:      { dot: '#333',    text: '等待聲音' },
      speaking:     { dot: '#a855f7', text: '說話中（靜音閘）' },
    };

    function draw() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#0d0d0d';
      ctx.fillRect(0, 0, W, H);

      const theme  = THEME[currentMode] || THEME.ambient;
      const barW   = W / HISTORY;
      const threshH = Math.min(THRESHOLD * H * SCALE, H);
      const threshY = H - threshH;

      history.forEach((rms, i) => {
        const barH   = Math.min(rms * H * SCALE, H);
        const x      = i * barW;
        const active = rms >= THRESHOLD;
        ctx.fillStyle = active ? theme.active : theme.dim;
        ctx.fillRect(x + 1, H - barH, barW - 2, barH);
      });

      // 門檻線
      ctx.strokeStyle = '#333';
      ctx.lineWidth   = 1;
      ctx.setLineDash([5, 5]);
      ctx.beginPath();
      ctx.moveTo(0, threshY);
      ctx.lineTo(W, threshY);
      ctx.stroke();
      ctx.setLineDash([]);

      document.getElementById('thresh-label').style.top = (threshY - 16) + 'px';
    }

    function loop() { draw(); requestAnimationFrame(loop); }
    loop();

    // ── SocketIO ──
    const socket = io();

    socket.on('connect', () => {
      document.getElementById('status').textContent = '已連線';
    });
    socket.on('disconnect', () => {
      document.getElementById('status').textContent = '已斷線';
      document.getElementById('mode-label').textContent = '已斷線';
    });

    socket.on('audio_level', (data) => {
      const rms      = data.rms      ?? 0;
      const mode     = data.mode     ?? 'ambient';
      const state    = data.state    ?? 'waiting';
      const progress = data.progress ?? 0;

      // 同步門檻（與 main.py VAD_SPEECH_THRESHOLD 保持一致）
      if (data.threshold !== undefined) {
        THRESHOLD = data.threshold;
        document.getElementById('thresh-label').textContent = `rms ${THRESHOLD.toFixed(3)}`;
      }

      history.push(rms);
      if (history.length > HISTORY) history.shift();

      currentMode  = mode;
      currentState = state;

      // 模式標籤
      const theme = THEME[mode] || THEME.ambient;
      document.getElementById('mode-label').textContent = theme.label;
      document.getElementById('mode-label').style.color = theme.color;

      // 狀態點 + 標籤
      const si = STATE_INFO[state] || STATE_INFO.waiting;
      document.getElementById('state-dot').style.background   = si.dot;
      document.getElementById('state-label').textContent      = si.text;

      // 進度條（只在 accumulating 時顯示）
      const progWrap = document.getElementById('progress-wrap');
      const progBar  = document.getElementById('progress-bar');
      const progLbl  = document.getElementById('progress-label');
      if (state === 'accumulating') {
        progWrap.style.display = 'block';
        progBar.style.width    = progress + '%';
        progBar.style.background = theme.color;
        const secs = Math.round(progress / 100 * 5);  // AMBIENT_SECONDS = 5
        progLbl.textContent    = `${secs}/5s`;
      } else {
        progWrap.style.display = 'none';
        progLbl.textContent    = '';
      }

      // RMS 數值
      document.getElementById('rms-value').textContent =
        `rms ${rms.toFixed(4)}  ${rms >= THRESHOLD ? '● 有聲音' : '○ 安靜'}`;
    });
  </script>
</body>
</html>
