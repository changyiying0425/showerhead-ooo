<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蓮蓬頭 — 音訊視覺化</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #ccc;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1rem;
      transition: background 0.5s;
    }

    #mode-label {
      font-size: 1.1rem;
      letter-spacing: 0.15em;
      transition: color 0.3s;
    }

    #state-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.8rem;
      color: #666;
      min-height: 1.4rem;
    }

    /* 進度條（環境音收音進度） */
    #progress-wrap {
      width: 200px;
      height: 6px;
      background: #222;
      border-radius: 3px;
      overflow: hidden;
      display: none;
      transition: background 0.5s;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: #42b8ff;
      border-radius: 3px;
      transition: width 0.25s linear, background 0.3s;
    }

    /* 狀態點 */
    #state-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    #canvas-wrap {
      position: relative;
    }

    canvas {
      display: block;
    }

    #rms-value {
      font-size: 0.8rem;
      color: #666;
    }

    #status {
      font-size: 0.7rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div id="mode-label">連線中…</div>

  <div id="state-row">
    <div id="state-dot"></div>
    <span id="state-label">—</span>
    <div id="progress-wrap">
      <div id="progress-bar"></div>
    </div>
    <span id="progress-label"></span>
  </div>

  <div id="canvas-wrap">
    <canvas id="waveform" width="700" height="200"></canvas>
  </div>

  <div id="rms-value">rms —</div>
  <div id="status">等待連線</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const canvas = document.getElementById('waveform');
    const ctx    = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    const HISTORY  = 140;     // ~14 秒歷史（每 0.1s 一格）
    let   THRESHOLD = 0.100;  // 由 server 動態更新
    const SCALE    = 2.5;
    const DOT_STEP = 6;       // 垂直方向點間距（px）
    const MAX_AMP  = H / 2 - DOT_STEP;  // 最大半振幅

    let history      = new Array(HISTORY).fill(0);
    let currentMode  = 'ambient';
    let currentState = 'waiting';

    const THEME = {
      ambient:  { label: '環境音模式',       color: '#42b8ff',
                  bg: '#0d0d0d', dot: '#dddddd', progressTrack: '#222' },
      dialogue: { label: '對話模式（握住中）', color: '#ff8c42',
                  bg: '#f0f0f0', dot: '#1a1a1a', progressTrack: '#ccc' },
    };

    const STATE_INFO = {
      accumulating: { dot: '#42b8ff', text: '收音中' },
      processing:   { dot: '#f5d020', text: '處理中' },
      speech:       { dot: '#ff4444', text: '偵測到聲音' },
      waiting:      { dot: '#555',    text: '等待聲音' },
      speaking:     { dot: '#a855f7', text: '說話中（靜音閘）' },
    };

    // ── 說話中：水波漂浮光點 ──────────────────────────────────
    let _waveSrc   = null;   // 波源狀態（跨幀持續）
    let _waveLastT = 0;

    function _ensureWaveSrc() {
      if (_waveSrc) return;
      _waveSrc = [
        { x: W*0.20, y: H*0.50, vx:  28, vy:  18 },
        { x: W*0.70, y: H*0.30, vx: -22, vy:  26 },
        { x: W*0.50, y: H*0.70, vx:  16, vy: -24 },
        { x: W*0.85, y: H*0.55, vx: -20, vy: -15 },
      ];
    }

    function drawSpeakingWave() {
      _ensureWaveSrc();
      const theme   = THEME[currentMode] || THEME.ambient;
      const t       = Date.now() / 1000;
      const dt      = Math.min(t - _waveLastT, 0.05);
      _waveLastT    = t;
      const spacing = 14;

      // 移動波源（軟彈邊界）
      _waveSrc.forEach(s => {
        s.x += s.vx * dt;
        s.y += s.vy * dt;
        if (s.x < W * 0.05) s.vx =  Math.abs(s.vx);
        if (s.x > W * 0.95) s.vx = -Math.abs(s.vx);
        if (s.y < H * 0.05) s.vy =  Math.abs(s.vy);
        if (s.y > H * 0.95) s.vy = -Math.abs(s.vy);
      });

      ctx.fillStyle = theme.bg;
      ctx.fillRect(0, 0, W, H);

      ctx.shadowBlur  = 10;
      ctx.shadowColor = theme.dot;
      ctx.fillStyle   = theme.dot;

      for (let x = spacing / 2; x < W; x += spacing) {
        for (let y = spacing / 2; y < H; y += spacing) {
          let inf = 0;
          _waveSrc.forEach(s => {
            const dist = Math.sqrt((x - s.x) ** 2 + (y - s.y) ** 2);
            const R = 110;
            if (dist < R) {
              const ripple  = 0.5 + 0.5 * Math.cos(dist * 0.13 - t * 3.5);
              const falloff = (1 - dist / R) ** 1.5;
              inf = Math.max(inf, falloff * ripple);
            }
          });
          if (inf < 0.08) continue;
          ctx.beginPath();
          ctx.arc(x, y, inf * spacing * 0.48, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      ctx.shadowBlur = 0;
    }

    // ── 處理中：放射狀 Halftone 圓形（呼吸動畫）──────────────
    function drawProcessingCircle() {
      const theme   = THEME[currentMode] || THEME.ambient;
      const cx = W / 2, cy = H / 2;
      const spacing = 8;
      const t = Date.now() / 1000;
      // 呼吸：0.62 ↔ 1.0，週期約 3 秒
      const pulse  = 0.62 + 0.38 * (0.5 + 0.5 * Math.sin(t * 2.1));
      const maxRad = (H / 2 - 2) * pulse;   // 圓形半徑隨呼吸縮放

      ctx.fillStyle = theme.bg;
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = theme.dot;

      for (let x = spacing / 2; x < W; x += spacing) {
        for (let y = spacing / 2; y < H; y += spacing) {
          const dist = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2);
          if (dist > maxRad * 1.08) continue;   // 超出圓形範圍跳過

          const norm = dist / maxRad;            // 0=圓心, 1=圓緣
          const size = Math.max(0, 1 - norm) * spacing * 0.46;
          if (size < 0.4) continue;

          ctx.beginPath();
          ctx.arc(x, y, size, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    // ── Halftone 點陣波形 ──────────────────────────────────
    function drawWaveform() {
      const theme   = THEME[currentMode] || THEME.ambient;
      const colW    = W / HISTORY;
      const centerY = H / 2;
      const maxR    = Math.max(colW * 0.42, 1.2);   // 最大點半徑
      const minR    = Math.max(maxR * 0.18, 0.5);   // 最小點半徑（邊緣）

      ctx.fillStyle = theme.bg;
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = theme.dot;

      history.forEach((rms, i) => {
        const ampH = Math.min(rms * H * SCALE, MAX_AMP);
        const x    = (i + 0.5) * colW;

        if (ampH < 1) {
          ctx.beginPath();
          ctx.arc(x, centerY, minR, 0, Math.PI * 2);
          ctx.fill();
          return;
        }

        const numDots = Math.round(ampH / DOT_STEP) + 1;

        for (let d = 0; d < numDots; d++) {
          const t = numDots > 1 ? d / (numDots - 1) : 0;
          const r = maxR - (maxR - minR) * t;
          const yOff = d * DOT_STEP;

          if (d === 0) {
            ctx.beginPath();
            ctx.arc(x, centerY, r, 0, Math.PI * 2);
            ctx.fill();
          } else {
            ctx.beginPath();
            ctx.arc(x, centerY - yOff, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x, centerY + yOff, r, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      });
    }

    function draw() {
      if (currentState === 'speaking') {
        drawSpeakingWave();
      } else if (currentState === 'processing') {
        drawProcessingCircle();
      } else {
        drawWaveform();
      }
    }

    function loop() { draw(); requestAnimationFrame(loop); }
    loop();

    // ── SocketIO ──────────────────────────────────────────
    const socket = io();

    socket.on('connect', () => {
      document.getElementById('status').textContent = '已連線';
    });
    socket.on('disconnect', () => {
      document.getElementById('status').textContent = '已斷線';
      document.getElementById('mode-label').textContent = '已斷線';
    });

    socket.on('audio_level', (data) => {
      const rms      = data.rms      ?? 0;
      const mode     = data.mode     ?? 'ambient';
      const state    = data.state    ?? 'waiting';
      const progress = data.progress ?? 0;

      if (data.threshold !== undefined) THRESHOLD = data.threshold;

      history.push(rms);
      if (history.length > HISTORY) history.shift();

      currentMode  = mode;
      currentState = state;

      // 模式標籤 + body 背景
      const theme = THEME[mode] || THEME.ambient;
      document.getElementById('mode-label').textContent  = theme.label;
      document.getElementById('mode-label').style.color  = theme.color;
      document.body.style.background = theme.bg;
      document.getElementById('progress-wrap').style.background = theme.progressTrack;

      // 狀態點 + 標籤
      const si = STATE_INFO[state] || STATE_INFO.waiting;
      document.getElementById('state-dot').style.background = si.dot;
      document.getElementById('state-label').textContent    = si.text;

      // 進度條（只在 accumulating 時顯示）
      const progWrap = document.getElementById('progress-wrap');
      const progBar  = document.getElementById('progress-bar');
      const progLbl  = document.getElementById('progress-label');
      if (state === 'accumulating') {
        progWrap.style.display   = 'block';
        progBar.style.width      = progress + '%';
        progBar.style.background = theme.color;
        const secs = Math.round(progress / 100 * 5);
        progLbl.textContent = `${secs}/5s`;
      } else {
        progWrap.style.display = 'none';
        progLbl.textContent    = '';
      }

      // RMS 數值
      document.getElementById('rms-value').textContent =
        `rms ${rms.toFixed(4)}  ${rms >= THRESHOLD ? '● 有聲音' : '○ 安靜'}`;
    });
  </script>
</body>
</html>
